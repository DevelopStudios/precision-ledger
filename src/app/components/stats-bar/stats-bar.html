<section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
  <div class="bg-surface-container p-6 rounded-xl border border-outline-variant/30">
    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2">WebSocket Events/Sec</p>
    <div class="flex items-baseline gap-2">
      <span class="text-3xl font-mono font-bold text-primary tracking-tighter">{{ market.eventsPerSecond() | number:'1.0-0' }}</span>
      <span class="text-xs text-slate-400 font-mono">ops/s</span>
    </div>
    <div class="mt-4 h-1 w-full bg-surface-container-lowest rounded-full overflow-hidden">
      <div class="h-full bg-primary transition-all duration-300" [style.width.%]="(market.eventsPerSecond() / 2000) * 100"></div>
    </div>
  </div>

  <div class="bg-surface-container p-6 rounded-xl border border-outline-variant/30">
    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2">Active Memory Heap</p>
    <div class="flex items-baseline gap-2">
      <span class="text-3xl font-mono font-bold text-tertiary tracking-tighter">{{ memory() | number:'1.1-1' }}</span>
      <span class="text-xs text-slate-400 font-mono">MB</span>
    </div>
    <div class="mt-4 h-1 w-full bg-surface-container-lowest rounded-full overflow-hidden">
      <div class="h-full bg-tertiary transition-all duration-300" [style.width.%]="(memory() / 512) * 100"></div>
    </div>
  </div>

  <div class="bg-surface-container p-6 rounded-xl border border-outline-variant/30">
    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2">UI Frame Rate (FPS)</p>
    <div class="flex items-baseline gap-2">
      <span class="text-3xl font-mono font-bold text-secondary tracking-tighter">{{ fps() }}</span>
      <span class="text-xs text-slate-400 font-mono">fps</span>
    </div>
    <div class="mt-4 h-1 w-full bg-surface-container-lowest rounded-full overflow-hidden">
      <div class="h-full bg-secondary transition-all duration-300" [style.width.%]="(fps() / 60) * 100"></div>
    </div>
  </div>
</section>
