<div class="px-4 md:px-8 py-6 md:py-8 border-b border-outline-variant/20 flex flex-col lg:flex-row justify-between items-center gap-6 md:gap-8 bg-surface-container/50">
  <div class="text-center lg:text-left">
    <h2 class="text-xl font-headline font-extrabold text-on-surface tracking-tight">Real-Time Liquidity Stream</h2>
    <p class="text-slate-500 text-sm">Processing {{ market.tickers().length }} parallel RxJS observables</p>
  </div>
  
  <div class="flex flex-col md:flex-row items-center gap-6 md:gap-10 bg-surface-container-lowest px-6 md:px-8 py-5 rounded-2xl border border-outline-variant/30 ring-1 ring-primary/5 w-full lg:w-auto">
    <div class="flex flex-col gap-2 w-full md:w-auto">
      <label class="text-[10px] font-bold uppercase tracking-[0.2em] text-primary text-center md:text-left">Throttle Control (RxJS)</label>
      <div class="flex items-center justify-center md:justify-start gap-4">
        <span class="text-[10px] font-mono text-slate-500">100ms</span>
        <input type="range" min="100" max="1000" step="50" [value]="market.throttleMs()" (input)="updateThrottle($event)"
               class="w-full md:w-48 h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-primary hover:accent-primary/80 transition-all">
        <span class="text-[10px] font-mono text-slate-500">1s</span>
      </div>
    </div>
    <div class="hidden md:block h-10 w-[1px] bg-outline-variant/30"></div>
    <div class="flex flex-col items-center md:items-start">
      <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500">Sample Strategy</span>
      <span class="text-sm font-mono text-primary font-bold">auditTime({{ market.throttleMs() }})</span>
    </div>
  </div>
</div>
